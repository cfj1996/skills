interface:
  display_name: "TAPD Workflow"
  short_description: "Orchestrate TAPD bug and story workflow with MCP-first collection"
  default_prompt: "Use $tapd-workflow to collect TAPD context via MCP, continue existing items, and require manual confirmation before any TAPD write. Create the worktree/branch during implementation, verify branch ancestry with gitlab-map before commit (must be from origin/master), and after commit verify merge readiness then merge directly to develop via GitLab. Batch Wiki/comment/status writes into one confirmation when possible. Before each stage transition, run the regression-checker agent to verify the stage is safe to advance. Before test wiki creation, verify branch commits are merged into origin/develop via gitlab-map; block wiki creation if false."

policy:
  allow_implicit_invocation: true
