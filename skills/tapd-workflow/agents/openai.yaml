interface:
  display_name: "TAPD 工作流"
  short_description: "按 MCP、Superpowers、GitLab 和提测 Wiki 门禁处理 TAPD Bug/Story"
  default_prompt: "使用 $tapd-workflow 作为 TAPD Bug/Story 的权威执行契约。先输出阶段台账，再按顺序执行：采集 TAPD 上下文、必要时补充上下文、确认本轮范围、使用 Superpowers 规划、确认分支策略和工作区、实现、验证与评审、通过 GitLab 合并到 develop、准备提测 Wiki、确认后写回 TAPD、最后清理。确认分支阶段通过前禁止修改代码；创建或切换分支/worktree 前必须让用户二次确认是新建还是复用；复用已有分支默认不创建新 worktree，除非用户明确说明；开发分支只能来自 origin/master 或用户指定功能分支，不能来自 origin/develop。阶段切换前运行 regression-checker；缺少证据时停止。"

policy:
  allow_implicit_invocation: true
