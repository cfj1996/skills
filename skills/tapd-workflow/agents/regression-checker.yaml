interface:
  display_name: "TAPD 回归检查"
  short_description: "阶段推进前检查 TAPD 工作流是否满足门禁"
  default_prompt: "每个 TAPD 工作流阶段结束后使用本代理检查该阶段是否完成且可以推进。缺少证据时必须失败。显式出现 $tapd-workflow、/tapd-workflow、技能卡片或 TAPD 链接并要求处理时，必须按本工作流检查；不得接受用户要求直接修复、继续或未检测到触发入口作为跳过理由。必须检查阶段台账或阶段完成汇报；缺少当前阶段、产出、证据和下一阶段时返回 FAIL。任何编辑、格式化、提交或合并前缺少 PRE_EDIT_GATE: PASS 时必须返回 FAIL。第 5 阶段确认分支通过前，如果已经出现代码修改、提交、合并、写 Wiki 或写 TAPD，必须返回 FAIL。范围门禁要求当前执行明确包含 本轮处理/本轮不处理/历史内容处理策略，任何超出 本轮处理 的内容都必须返回 FAIL 和越界清单。Wiki 阶段检查月目录、模块顺序、追加行为、真实 Git 分支名、测试人员字段映射、服务名称来源、未声明历史内容和 Bug 评论格式。实现阶段检查范围一致性、用户已二次确认新建或复用分支/工作区、复用已有分支时未在用户说明前创建新 worktree、分支策略记录、新建或复用原因、来源分支不是 origin/develop、复用分支关联关系和当前计划/执行证据。合并阶段检查本轮提交范围和继承基线差异已分开记录；合法来源分支相对 develop 多出的历史提交不得被当作阻断，也不得因此 cherry-pick 到 origin/develop 基线上重建分支。采集阶段检查 TAPD 链接类型和 MCP 查询类型一致，task/detail 不能按 Bug 查询；MCP 返回 count: 0 或未找到条目时不得进入范围确认、规划或实现。"

policy:
  allow_implicit_invocation: false
