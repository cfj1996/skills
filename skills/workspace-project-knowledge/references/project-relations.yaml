version: 1
workspace: ${workspace_root}
description: >
  Workspace-level project map and routing index for local company projects,
  AI skills, private packages, Jenkins jobs, and graphify knowledge entrypoints.

workspace_root:
  variable: ${workspace_root}
  note: >
    ${workspace_root} is a placeholder for the current user's local company
    projects directory. Resolve it before opening files or reporting paths.
  author_default: /Users/cfj/projects
  resolution_order:
    - explicit_user_workspace_path
    - current_working_directory_workspace
    - WORKSPACE_ROOT_or_PROJECTS_ROOT_environment_variable
    - local_AI_CONTEXT_and_project_relations_parent_directory
    - author_default_only_on_cfj_machine

entrypoints:
  bundled_workspace_context: references/AI_CONTEXT.md
  bundled_relations_index: references/project-relations.yaml
  local_workspace_context_mirror: ${workspace_root}/AI_CONTEXT.md
  local_relations_index_mirror: ${workspace_root}/project-relations.yaml
  skill: skills/workspace-project-knowledge/SKILL.md

defaults:
  project_context: "{path}/AI_CONTEXT.md"
  graph_report: "{path}/graphify-out/GRAPH_REPORT.md"
  graph_json: "{path}/graphify-out/graph.json"
  service_name_rule: "默认使用项目名；命中特例时使用 service_name。"

runtime_relationships:
  business_center: 商家
  summary: >
    公司主要系统围绕商家服务展开：公司内部大后台管理商家、供应商和财务；
    中台和供应商系统服务商家管理与供货；商家平台通过 main_menu 宿主和 iframe
    子系统承载商家侧后台；商城系统服务 C 端交易和直播；服务商体系独立包含
    服务商后台和移动端。老管理后台多数仍是 Vue2，factory 承载部分老系统页面重构，
    zan-atlas 是为改善 iframe 嵌入体验而诞生的跨平台基座，目前未上生产。
  systems:
    retail_wholesale_agent_admin:
      display_name: 零售批发代理综合信息系统
      short_name: 大后台
      project_ref: admin_menu
      access_patterns: ["xxx/admin_menu"]
      users: [公司内部]
      responsibilities: [商家管理, 供应商管理, 财务信息管理, 公司内部运营管理]
      technology: Vue2老管理后台体系
      routing_keywords: [大后台, 零售批发代理综合信息系统, 公司内部管理, 商家管理, 供应商管理, 财务管理]
    operator_middle_platform:
      display_name: 运营商管理系统
      short_name: 中台
      project_ref: supplier-admin-web
      service_alias: middleManage
      access_patterns: ["xxx/middleManage/#/login"]
      users: [商家管理方, 平台运营方]
      responsibilities: [商家管理平台, 商家运营管理]
      technology: Vue2老管理后台体系
      routing_keywords: [运营商管理系统, 中台, middleManage, 商家管理平台]
    supplier_system:
      display_name: 供应商系统
      project_ref: supplier-admin-web
      service_alias: suppliers
      access_patterns: ["xxx/suppliers/#/login"]
      users: [供应商]
      responsibilities: [供应商供货, 供应商协作, 商家供货链路]
      technology: Vue2老管理后台体系
      routing_keywords: [供应商系统, suppliers, 供应商供货, 供货]
    merchant_platform:
      display_name: 商家平台
      project_ref: jbz_admin
      service_name: main_menu
      folder_name: jbz_admin
      host_access_patterns: ["xxx/main_menu?siteId={商家id}"]
      child_access_patterns: ["xxx/{storeAdmin|kpadmin|factory|...}/xxx?siteId={商家id}"]
      embedding: iframe
      responsibilities: [商家侧主后台宿主, iframe子系统集成, 商家后台入口]
      technology: Vue2老管理后台体系
      child_project_refs: [store_admin, kp_admin, order-admin, poster_admin, statistics_admin, ledger_admin, weixin-live, zan-projects.factory]
      notes:
        - factory 不只服务商家平台，也服务老系统多个管理系统。
        - 商家平台通过 siteId 识别商家上下文。
      routing_keywords: [商家平台, 商家后台, main_menu, siteId, iframe宿主]
    mall_system:
      display_name: 商城系统
      scope_note: 除 provider-mobile 外的大部分 C 端/商城项目都归入商城系统关系。
      web_h5_project_refs: [jbz_shop, Ucenter, instant-apps]
      web_h5_access_patterns: ["xxx/{mall|ucenter|plain-app}/xxx?siteId={商家id}"]
      mini_program_project_refs: [shop_mp, zan-mini]
      live_mini_program_package: ${workspace_root}/zan-mini/plugins/live/miniprogram
      responsibilities: [商城H5, 用户中心, C端直播, 商城小程序, 小程序直播包]
      ownership_note: 移动端不是用户当前主要负责范围，但系统关系需要保留。
      routing_keywords: [商城系统, 商城H5, mall, ucenter, plain-app, 商城小程序, 小程序直播包]
    provider_system:
      display_name: 服务商体系
      admin_project_ref: zan-projects.facilitator
      mobile_project_ref: provider-mobile
      admin_access_patterns: ["xxx/facilitator/login"]
      mobile_access_patterns: ["xxx/provider-mobile/login?tenantId={租户id}"]
      responsibilities: [服务商后台管理, 服务商移动端]
      routing_keywords: [服务商, facilitator, provider-mobile, tenantId, 服务商移动端]
    independent_systems:
      examples: [zan-projects.live-monitor, fronted]
      note: 直播审核平台、客服平台等相对独立，除非用户明确提到，不默认并入商家主链路。
  technology_evolution:
    legacy_stack_projects: [admin_menu, supplier-admin-web, jbz_admin, kp_admin, store_admin, order-admin, poster_admin, statistics_admin, ledger_admin, weixin-live]
    legacy_stack: Vue2老管理后台体系
    refactor_carrier: zan-projects.factory
    refactor_note: factory 用于重构并嵌入老系统页面，但不只服务商家平台。
    iframe_limitation: iframe 嵌入体验不够好
    next_platform: zan-atlas
    next_platform_status: 未上生产

