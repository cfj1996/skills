        ai_context: ${workspace_root}/zan-projects/admin/live-monitor/AI_CONTEXT.md
        graph_report: ${workspace_root}/zan-projects/admin/live-monitor/graphify-out/GRAPH_REPORT.md
      siqian:
        path: ${workspace_root}/zan-projects/admin/siqian
